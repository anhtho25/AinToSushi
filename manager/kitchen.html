<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bếp - Quản Lý Nhà Hàng</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="theme-aintosushi">
    <div style="display: flex;">
        <aside class="sidebar">
            <div style="padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <h2 style="color: var(--gold); display: flex; align-items: center; gap: 0.75rem;">
                    <img src="../images/logo3.png" alt="Ain Tō Sushi Logo" style="height: 50px; width: auto; filter: drop-shadow(0 2px 4px rgba(212, 175, 55, 0.4));">
                    <span>Ain Tō Sushi</span>
                </h2>
                <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Khu vực bếp</p>
            </div>
            <ul>
                <li><a href="kitchen.html" class="active">👨‍🍳 Quản Lý Đơn</a></li>
                <li><a href="#" id="logoutBtn">🚪 Đăng Xuất</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="color: var(--primary-color);">Bếp - Quản Lý Đơn Hàng</h1>
                    <p style="color: var(--text-light);">Theo dõi và chuẩn bị các món ăn</p>
                </div>
            </div>

            <!-- Order Status Tabs -->
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid var(--border-color);">
                <button class="tab-btn active" data-status="pending">Chờ Chuẩn Bị</button>
                <button class="tab-btn" data-status="preparing">Đang Chuẩn Bị</button>
                <button class="tab-btn" data-status="ready">Sẵn Sàng</button>
                <button class="tab-btn" data-status="completed">Hoàn Thành</button>
            </div>

            <!-- Orders List -->
            <div class="card">
                <h2 class="card-header">Đơn Hàng Cần Chuẩn Bị</h2>
                <div id="ordersList">
                    <!-- Orders will be loaded here -->
                    <div style="text-align: center; padding: 3rem; color: var(--text-light);">
                        <p>Đang tải đơn hàng...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initRoleGuard } from '../js/roleGuard.js';
        import { logout } from '../js/auth.js';

        // Initialize role guard
        initRoleGuard();

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                await logout();
            }
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const status = btn.dataset.status;
                loadOrders(status);
            });
        });

        // Load orders by status
        function loadOrders(status) {
            const ordersList = document.getElementById('ordersList');
            // TODO: Load orders from Firebase
            ordersList.innerHTML = `
                <div style="text-align: center; padding: 3rem; color: var(--text-light);">
                    <p>Chưa có đơn hàng nào ở trạng thái "${status}"</p>
                </div>
            `;
        }

        // Load initial orders
        loadOrders('pending');
    </script>
</body>
</html>
