<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Ain Tō Sushi</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body.theme-aintosushi .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url("../images/hinh4.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 2rem;
        }
        .auth-card {
            background: var(--white);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header h1 {
            color: var(--text-dark);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .logo-auth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .logo-auth img {
            height: 60px;
            width: auto;
        }
        .logo-auth span {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
        }
        .error-message {
            background: #FEE2E2;
            color: #DC2626;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #D1FAE5;
            color: #065F46;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--dark-bg);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            color: var(--text-light);
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--border-color);
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }
        .btn-google {
            width: 100%;
            padding: 1rem;
            background: var(--white);
            color: var(--text-dark);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .btn-google:hover {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
        }
    </style>
</head>
<body class="theme-aintosushi">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-auth">
                    <img src="../images/logo3.png" alt="Ain Tō Sushi Logo">
                    <span>Ain Tō Sushi</span>
                </div>
                <h1>Đăng Nhập</h1>
                <p>Chào mừng trở lại!</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Nhập email của bạn">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
                    <p style="margin-top: 0.5rem; text-align: right;">
                        <a href="#" id="forgotPasswordLink" style="font-size: 0.9rem; color: var(--gold); text-decoration: none;">Quên mật khẩu?</a>
                    </p>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Đăng Nhập</button>
            </form>

            <div class="divider">Hoặc</div>

            <button type="button" class="btn-google" id="googleLoginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Đăng nhập với Google
            </button>

            <!-- Modal Quên mật khẩu -->
            <div id="forgotPasswordModal" class="modal-overlay" style="display: none;">
                <div class="auth-card" style="max-width: 400px;">
                    <h2 style="margin-bottom: 0.5rem;">Quên mật khẩu</h2>
                    <p style="color: var(--text-light); font-size: 0.95rem; margin-bottom: 1.5rem;">Nhập email đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu.</p>
                    <div id="forgotError" class="error-message"></div>
                    <div id="forgotSuccess" class="success-message"></div>
                    <form id="forgotPasswordForm">
                        <div class="form-group">
                            <label for="forgotEmail">Email</label>
                            <input type="email" id="forgotEmail" required placeholder="Nhập email của bạn">
                        </div>
                        <button type="submit" class="btn-login" id="forgotSubmitBtn">Gửi email đặt lại mật khẩu</button>
                    </form>
                    <p style="text-align: center; margin-top: 1rem;">
                        <a href="#" id="closeForgotModal" style="color: var(--gold); text-decoration: none;">← Quay lại đăng nhập</a>
                    </p>
                </div>
            </div>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                <p><a href="../index.html">← Về trang chủ</a></p>
            </div>

        </div>
    </div>

    <script type="module" src="../js/auth.js"></script>
    <script type="module">
        (function saveReturnUrl() {
            var r = document.referrer;
            if (r && r.length > 0 && r.indexOf('auth/login') === -1 && r.indexOf('auth/register') === -1) {
                try {
                    sessionStorage.setItem('returnUrl', r);
                } catch (e) {}
            }
        })();
        import { login, loginWithGoogle, sendPasswordReset } from '../js/auth.js';

        const loginForm = document.getElementById('loginForm');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        if (new URLSearchParams(window.location.search).get('error') === 'disabled') {
            showError('Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên.');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang đăng nhập...';

            try {
                await login(email, password);
                showSuccess('Đăng nhập thành công! Đang chuyển hướng...');
            } catch (error) {
                console.error('Login error:', error);
                let errorMsg = 'Đăng nhập thất bại. Vui lòng thử lại.';
                
                const errorCode = error.code || error.error?.code || '';
                
                if (errorCode === 'auth/user-not-found' || errorCode === 'auth/invalid-credential') {
                    errorMsg = 'Email hoặc mật khẩu không đúng.';
                } else if (errorCode === 'auth/wrong-password') {
                    errorMsg = 'Mật khẩu không đúng.';
                } else if (errorCode === 'auth/invalid-email') {
                    errorMsg = 'Email không hợp lệ.';
                } else if (errorCode === 'auth/user-disabled') {
                    errorMsg = 'Tài khoản đã bị vô hiệu hóa.';
                } else if (errorCode === 'auth/too-many-requests') {
                    errorMsg = 'Quá nhiều lần thử đăng nhập. Vui lòng thử lại sau.';
                } else if (errorCode === 'auth/network-request-failed') {
                    errorMsg = 'Lỗi kết nối mạng. Vui lòng kiểm tra kết nối internet.';
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                showError(errorMsg);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng Nhập';
            }
        });

        googleLoginBtn.addEventListener('click', async () => {
            hideMessages();
            googleLoginBtn.disabled = true;
            googleLoginBtn.textContent = 'Đang đăng nhập...';

            try {
                await loginWithGoogle();
                showSuccess('Đăng nhập thành công! Đang chuyển hướng...');
            } catch (error) {
                console.error('Google login error:', error);
                let errorMsg = 'Đăng nhập với Google thất bại.';
                
                const errorCode = error.code || error.error?.code || '';
                
                if (errorCode === 'auth/popup-closed-by-user') {
                    errorMsg = 'Bạn đã đóng cửa sổ đăng nhập.';
                } else if (errorCode === 'auth/popup-blocked') {
                    errorMsg = 'Cửa sổ popup bị chặn. Vui lòng cho phép popup và thử lại.';
                } else if (errorCode === 'auth/cancelled-popup-request') {
                    errorMsg = 'Chỉ có thể mở một cửa sổ popup tại một thời điểm.';
                } else if (errorCode === 'auth/account-exists-with-different-credential') {
                    errorMsg = 'Email này đã được đăng ký với phương thức khác. Vui lòng đăng nhập bằng email/password.';
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                showError(errorMsg);
            } finally {
                googleLoginBtn.disabled = false;
                googleLoginBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Đăng nhập với Google
                `;
            }
        });

        // Quên mật khẩu
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const forgotPasswordModal = document.getElementById('forgotPasswordModal');
        const closeForgotModal = document.getElementById('closeForgotModal');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const forgotEmail = document.getElementById('forgotEmail');
        const forgotSubmitBtn = document.getElementById('forgotSubmitBtn');
        const forgotError = document.getElementById('forgotError');
        const forgotSuccess = document.getElementById('forgotSuccess');

        function showForgotError(msg) {
            forgotError.textContent = msg;
            forgotError.classList.add('show');
            forgotSuccess.classList.remove('show');
        }
        function showForgotSuccess(msg) {
            forgotSuccess.textContent = msg;
            forgotSuccess.classList.add('show');
            forgotError.classList.remove('show');
        }

        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            forgotError.classList.remove('show');
            forgotSuccess.classList.remove('show');
            forgotEmail.value = document.getElementById('email').value || '';
            forgotPasswordModal.style.display = 'flex';
        });

        closeForgotModal.addEventListener('click', (e) => {
            e.preventDefault();
            forgotPasswordModal.style.display = 'none';
        });

        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = forgotEmail.value.trim();
            if (!email) {
                showForgotError('Vui lòng nhập email.');
                return;
            }
            forgotSubmitBtn.disabled = true;
            forgotSubmitBtn.textContent = 'Đang gửi...';
            forgotError.classList.remove('show');
            forgotSuccess.classList.remove('show');
            try {
                await sendPasswordReset(email);
                showForgotSuccess('Đã gửi email đặt lại mật khẩu. Vui lòng kiểm tra hộp thư (và thư mục spam).');
                forgotPasswordForm.reset();
            } catch (err) {
                const code = err.code || '';
                if (code === 'auth/user-not-found') {
                    showForgotError('Không tìm thấy tài khoản với email này.');
                } else if (code === 'auth/invalid-email') {
                    showForgotError('Email không hợp lệ.');
                } else if (code === 'auth/too-many-requests') {
                    showForgotError('Quá nhiều yêu cầu. Vui lòng thử lại sau.');
                } else {
                    showForgotError(err.message || 'Gửi email thất bại. Vui lòng thử lại.');
                }
            } finally {
                forgotSubmitBtn.disabled = false;
                forgotSubmitBtn.textContent = 'Gửi email đặt lại mật khẩu';
            }
        });
    </script>
</body>
</html>
