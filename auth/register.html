<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Ain Tō Sushi</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-color) 100%);
            padding: 2rem;
        }
        .auth-card {
            background: var(--white);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header h1 {
            color: var(--text-dark);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .logo-auth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .logo-auth img {
            height: 60px;
            width: auto;
        }
        .logo-auth span {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
        }
        .error-message {
            background: #FEE2E2;
            color: #DC2626;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #D1FAE5;
            color: #065F46;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        }
        .password-requirements {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 0.5rem;
        }
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--dark-bg);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            color: var(--text-light);
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--border-color);
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }
        .btn-google {
            width: 100%;
            padding: 1rem;
            background: var(--white);
            color: var(--text-dark);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .btn-google:hover {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .info-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #EFF6FF;
            border-radius: 12px;
            border: 1px solid #BFDBFE;
        }
        .info-box p {
            font-size: 0.85rem;
            color: #1E40AF;
            margin: 0;
            line-height: 1.6;
        }
    </style>
</head>
<body class="theme-aintosushi">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-auth">
                    <img src="../images/logo3.png" alt="Ain Tō Sushi Logo">
                    <span>Ain Tō Sushi</span>
                </div>
                <h1>Đăng Ký</h1>
                <p>Tạo tài khoản khách hàng mới</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Họ và tên</label>
                    <input type="text" id="name" name="name" required placeholder="Nhập họ và tên">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Nhập email của bạn">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required placeholder="Tối thiểu 6 ký tự">
                    <div class="password-requirements">
                        Mật khẩu phải có ít nhất 6 ký tự
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Nhập lại mật khẩu">
                </div>

                <button type="submit" class="btn-register" id="registerBtn">Đăng Ký</button>
            </form>

            <div class="divider">Hoặc</div>

            <button type="button" class="btn-google" id="googleRegisterBtn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Đăng ký với Google
            </button>

            <div class="info-box">
                <p><strong>Lưu ý:</strong> Chỉ khách hàng (Customer) mới có thể đăng ký tài khoản mới. Tài khoản nhân viên được quản lý bởi hệ thống.</p>
            </div>

            <div class="auth-footer">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
                <p><a href="../index.html">← Về trang chủ</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="../js/auth.js"></script>
    <script type="module">
        (function saveReturnUrl() {
            var r = document.referrer;
            if (r && r.length > 0 && r.indexOf('auth/login') === -1 && r.indexOf('auth/register') === -1) {
                try { sessionStorage.setItem('returnUrl', r); } catch (e) {}
            }
        })();
        import { register, registerWithGoogle } from '../js/auth.js';

        const registerForm = document.getElementById('registerForm');
        const googleRegisterBtn = document.getElementById('googleRegisterBtn');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!name) {
                showError('Vui lòng nhập họ và tên.');
                return;
            }

            if (password.length < 6) {
                showError('Mật khẩu phải có ít nhất 6 ký tự.');
                return;
            }

            if (password !== confirmPassword) {
                showError('Mật khẩu xác nhận không khớp.');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Đang đăng ký...';

            try {
                await register(email, password, name);
                showSuccess('Đăng ký thành công! Đang chuyển hướng...');
            } catch (error) {
                console.error('Register error:', error);
                let errorMsg = 'Đăng ký thất bại. Vui lòng thử lại.';
                
                const errorCode = error.code || error.error?.code || '';
                
                if (errorCode === 'auth/email-already-in-use') {
                    errorMsg = 'Email này đã được sử dụng. Vui lòng đăng nhập hoặc sử dụng email khác.';
                } else if (errorCode === 'auth/invalid-email') {
                    errorMsg = 'Email không hợp lệ.';
                } else if (errorCode === 'auth/weak-password') {
                    errorMsg = 'Mật khẩu quá yếu. Mật khẩu phải có ít nhất 6 ký tự.';
                } else if (errorCode === 'auth/network-request-failed') {
                    errorMsg = 'Lỗi kết nối mạng. Vui lòng kiểm tra kết nối internet.';
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                showError(errorMsg);
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Đăng Ký';
            }
        });

        googleRegisterBtn.addEventListener('click', async () => {
            hideMessages();
            googleRegisterBtn.disabled = true;
            googleRegisterBtn.textContent = 'Đang đăng ký...';

            try {
                await registerWithGoogle();
                showSuccess('Đăng ký thành công! Đang chuyển hướng...');
            } catch (error) {
                console.error('Google register error:', error);
                let errorMsg = 'Đăng ký với Google thất bại.';
                
                const errorCode = error.code || error.error?.code || '';
                
                if (errorCode === 'auth/popup-closed-by-user') {
                    errorMsg = 'Bạn đã đóng cửa sổ đăng nhập.';
                } else if (errorCode === 'auth/popup-blocked') {
                    errorMsg = 'Cửa sổ popup bị chặn. Vui lòng cho phép popup và thử lại.';
                } else if (errorCode === 'auth/cancelled-popup-request') {
                    errorMsg = 'Chỉ có thể mở một cửa sổ popup tại một thời điểm.';
                } else if (errorCode === 'auth/account-exists-with-different-credential') {
                    errorMsg = 'Email này đã được đăng ký với phương thức khác. Vui lòng đăng nhập.';
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                showError(errorMsg);
            } finally {
                googleRegisterBtn.disabled = false;
                googleRegisterBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Đăng ký với Google
                `;
            }
        });
    </script>
</body>
</html>
