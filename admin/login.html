<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Quản Lý</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">
                <img src="../images/logo3.png" alt="Ain Tō Sushi Logo">
                <span>Ain Tō Sushi</span>
            </a>
            <ul>
                <li><a href="../index.html">Về Trang Chủ</a></li>
            </ul>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Đăng Nhập</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required placeholder="Nhập tên đăng nhập">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
                </div>
                <div class="form-group">
                    <label for="role">Vai trò</label>
                    <select id="role" name="role" required>
                        <option value="">Chọn vai trò</option>
                        <option value="manager">Quản lý</option>
                        <option value="waiter">Nhân viên phục vụ</option>
                        <option value="chef">Đầu bếp</option>
                        <option value="cashier">Thu ngân</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Đăng Nhập</button>
            </form>
            <div style="margin-top: 1rem; text-align: center;">
                <p style="color: var(--text-light); font-size: 0.9rem;">
                    <a href="#" style="color: var(--primary-color);">Quên mật khẩu?</a>
                </p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Ain Tō Sushi. Hệ thống quản lý nhà hàng.</p>
    </footer>
</body>
</html>
